<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA News Feed</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #1a1a1a; font-size: 2.5rem; margin-bottom: 10px; }
        .meta { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        .main-image { width: 100%; height: auto; border-radius: 8px; margin-bottom: 30px; display: block; }
        .content { font-size: 1.1rem; line-height: 1.8; color: #444; }
        hr { border: 0; border-top: 1px solid #eee; margin: 30px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{TITULO}}</h1>
        <div class="meta">Publicado automáticamente el: {{FECHA}}</div>
        <img src="{{IMAGEN}}" alt="Noticia Imagen" class="main-image">
        <div class="content">{{CONTENIDO}}</div>
        <hr>
        <p><small>Generado mediante automatización con Gemini AI & GitHub Actions.</small></p>
    </div>
</body>
</html>
